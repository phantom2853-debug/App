<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa COMRED Fortalecidas - Guatemala</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --bg:#0f1115;
    --panel:#171a21;
    --panel-border:#262b35;
    --orange:#f97316;
    --orange-dark:#c2540a;
    --text:#e8e9ec;
    --text-dim:#9aa0ab;
    --green:#22c55e;
    --gray:#6b7280;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);font-family:'Segoe UI',Arial,sans-serif;color:var(--text);}
  #app{display:flex;flex-direction:column;height:100vh;}

  header{
    background:linear-gradient(90deg, #1a1d24, #14161b);
    border-bottom:2px solid var(--orange);
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
  }
  header h1{
    font-size:17px;
    margin:0;
    letter-spacing:.3px;
  }
  header h1 span{color:var(--orange);}
  header .subtitle{font-size:12px;color:var(--text-dim);margin-top:2px;}

  .stats{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .stat-chip{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:8px;
    padding:6px 12px;
    font-size:12px;
    text-align:center;
    min-width:70px;
  }
  .stat-chip b{display:block;font-size:16px;}
  .stat-chip.acred b{color:var(--green);}
  .stat-chip.pend b{color:var(--orange);}

  #main{flex:1;display:flex;min-height:0;}

  #sidebar{
    width:300px;
    background:var(--panel);
    border-right:1px solid var(--panel-border);
    padding:14px;
    overflow-y:auto;
    flex-shrink:0;
  }
  #sidebar h2{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);margin:0 0 8px;}
  .filter-group{margin-bottom:16px;}
  select, input[type=text]{
    width:100%;
    background:#0f1115;
    border:1px solid var(--panel-border);
    color:var(--text);
    padding:8px 10px;
    border-radius:6px;
    font-size:13px;
    margin-bottom:8px;
  }
  select:focus, input:focus{outline:1px solid var(--orange);}

  .legend-item{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:6px;color:var(--text-dim);}
  .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid #0f1115;}
  .dot.green{background:var(--green);}
  .dot.orange{background:var(--orange);}

  #muni-list{margin-top:10px;}
  .muni-card{
    background:#1d212a;
    border:1px solid var(--panel-border);
    border-radius:8px;
    padding:10px;
    margin-bottom:8px;
    cursor:pointer;
    transition:border-color .15s;
  }
  .muni-card:hover{border-color:var(--orange);}
  .muni-card .name{font-weight:600;font-size:13px;}
  .muni-card .dept{font-size:11px;color:var(--text-dim);}
  .muni-card .badge{
    display:inline-block;
    font-size:10px;
    padding:2px 7px;
    border-radius:10px;
    margin-top:5px;
  }
  .badge.acred{background:rgba(34,197,94,.15);color:var(--green);}
  .badge.pend{background:rgba(249,115,22,.15);color:var(--orange);}

  #map{flex:1;}

  .leaflet-popup-content-wrapper{
    background:#171a21;
    color:var(--text);
    border-radius:10px;
    border:1px solid var(--panel-border);
  }
  .leaflet-popup-tip{background:#171a21;}
  .popup-title{font-size:14px;font-weight:700;margin-bottom:2px;}
  .popup-dept{font-size:11px;color:var(--text-dim);margin-bottom:8px;}
  .popup-status{
    display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;margin-bottom:8px;
  }
  .popup-status.acred{background:rgba(34,197,94,.18);color:var(--green);}
  .popup-status.pend{background:rgba(249,115,22,.18);color:var(--orange);}
  .popup-section-title{font-size:11px;text-transform:uppercase;color:var(--text-dim);margin:8px 0 4px;letter-spacing:.4px;}
  .topic-tag{
    display:inline-block;
    background:#2a2f3a;
    color:var(--text);
    font-size:10.5px;
    padding:3px 7px;
    border-radius:5px;
    margin:2px 3px 0 0;
  }
  .no-topics{font-size:11px;color:var(--text-dim);font-style:italic;}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:#2a2f3a;border-radius:4px;}

  @media (max-width:720px){
    #sidebar{
      position:absolute;
      z-index:1000;
      height:calc(100vh - 118px);
      transform:translateX(-100%);
      transition:transform .2s;
      box-shadow:4px 0 12px rgba(0,0,0,.5);
    }
    #sidebar.open{transform:translateX(0);}
    #toggleSidebar{display:inline-block !important;}
  }
  #toggleSidebar{
    display:none;
    background:var(--orange);
    color:#0f1115;
    border:none;
    border-radius:6px;
    padding:8px 12px;
    font-weight:700;
    font-size:12px;
    cursor:pointer;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>🗺️ Mapa de <span>COMRED Fortalecidas</span></h1>
      <div class="subtitle">Coordinadoras Municipales para la Reducción de Desastres · Guatemala</div>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
      <button id="toggleSidebar">☰ Filtros</button>
      <div class="stats">
        <div class="stat-chip acred"><b id="countAcred">0</b>Acreditadas</div>
        <div class="stat-chip pend"><b id="countPend">0</b>Pendientes</div>
        <div class="stat-chip"><b id="countTotal">0</b>Total</div>
      </div>
    </div>
  </header>

  <div id="main">
    <div id="sidebar">
      <div class="filter-group">
        <h2>Buscar</h2>
        <input type="text" id="searchBox" placeholder="Nombre de municipio...">
      </div>
      <div class="filter-group">
        <h2>Departamento</h2>
        <select id="deptFilter"><option value="">Todos los departamentos</option></select>
      </div>
      <div class="filter-group">
        <h2>Estatus</h2>
        <select id="statusFilter">
          <option value="">Todos</option>
          <option value="Acreditada">Acreditada</option>
          <option value="Pendiente">Pendiente</option>
        </select>
      </div>
      <div class="filter-group">
        <h2>Leyenda</h2>
        <div class="legend-item"><span class="dot green"></span> COMRED Acreditada</div>
        <div class="legend-item"><span class="dot orange"></span> Pendiente / En proceso</div>
      </div>
      <div class="filter-group">
        <h2 id="listTitle">Municipios (340)</h2>
        <div id="muni-list"></div>
      </div>
    </div>
    <div id="map"></div>
  </div>
</div>

<script>
const map = L.map('map', { zoomControl: true }).setView([15.5, -90.3], 8);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  maxZoom: 18
}).addTo(map);

let markers = [];
let currentFilter = { dept: '', status: '', search: '' };

function makeIcon(status){
  const color = status === 'Acreditada' ? '#22c55e' : '#f97316';
  return L.divIcon({
    className: '',
    html: '<div style="width:16px;height:16px;border-radius:50%;background:' + color + ';border:2px solid #0f1115;box-shadow:0 0 0 2px ' + color + '55;"></div>',
    iconSize: [16,16],
    iconAnchor: [8,8]
  });
}

function popupHtml(d){
  const statusClass = d.estatus === 'Acreditada' ? 'acred' : 'pend';
  let topicsHtml = '<span class="no-topics">Sin temas registrados aún</span>';
  if(d.temas_recibidos && d.temas_recibidos.length){
    topicsHtml = d.temas_recibidos.map(function(t){ return '<span class="topic-tag">' + t + '</span>'; }).join('');
  }
  const fecha = d.fecha_acreditacion ? ('<div style="font-size:11px;color:var(--text-dim);margin-top:6px;">Acreditación: ' + d.fecha_acreditacion + '</div>') : '';
  return '' +
    '<div class="popup-title">' + d.municipio + '</div>' +
    '<div class="popup-dept">' + d.departamento + ' · Región ' + (d.region || '-') + '</div>' +
    '<span class="popup-status ' + statusClass + '">' + d.estatus + '</span>' +
    fecha +
    '<div class="popup-section-title">Temas recibidos</div>' +
    '<div>' + topicsHtml + '</div>';
}

function buildMarkers(){
  COMRED_DATA.forEach(function(d){
    const m = L.marker([d.lat, d.lon], { icon: makeIcon(d.estatus) });
    m.bindPopup(popupHtml(d), { maxWidth: 260 });
    m._data = d;
    markers.push(m);
  });
}

function passesFilter(d){
  if(currentFilter.dept && d.departamento !== currentFilter.dept) return false;
  if(currentFilter.status && d.estatus !== currentFilter.status) return false;
  if(currentFilter.search && d.municipio.toLowerCase().indexOf(currentFilter.search.toLowerCase()) === -1) return false;
  return true;
}

function renderMap(){
  markers.forEach(function(m){
    if(passesFilter(m._data)){
      if(!map.hasLayer(m)) m.addTo(map);
    } else {
      if(map.hasLayer(m)) map.removeLayer(m);
    }
  });
}

function renderSidebarList(){
  const list = document.getElementById('muni-list');
  const filtered = COMRED_DATA.filter(passesFilter);
  document.getElementById('listTitle').textContent = 'Municipios (' + filtered.length + ')';
  list.innerHTML = filtered.slice(0, 150).map(function(d){
    const badgeClass = d.estatus === 'Acreditada' ? 'acred' : 'pend';
    return '<div class="muni-card" data-lat="' + d.lat + '" data-lon="' + d.lon + '">' +
      '<div class="name">' + d.municipio + '</div>' +
      '<div class="dept">' + d.departamento + '</div>' +
      '<span class="badge ' + badgeClass + '">' + d.estatus + '</span>' +
    '</div>';
  }).join('');

  list.querySelectorAll('.muni-card').forEach(function(card){
    card.addEventListener('click', function(){
      const lat = parseFloat(card.dataset.lat);
      const lon = parseFloat(card.dataset.lon);
      map.flyTo([lat, lon], 12, { duration: 0.8 });
      const marker = markers.find(function(m){ return m._data.lat === lat && m._data.lon === lon; });
      if(marker) setTimeout(function(){ marker.openPopup(); }, 500);
    });
  });
}

function updateStats(){
  const acred = COMRED_DATA.filter(function(d){ return d.estatus === 'Acreditada'; }).length;
  const pend = COMRED_DATA.length - acred;
  document.getElementById('countAcred').textContent = acred;
  document.getElementById('countPend').textContent = pend;
  document.getElementById('countTotal').textContent = COMRED_DATA.length;
}

function populateDeptFilter(){
  const depts = Array.from(new Set(COMRED_DATA.map(function(d){ return d.departamento; }))).sort();
  const sel = document.getElementById('deptFilter');
  depts.forEach(function(dep){
    const opt = document.createElement('option');
    opt.value = dep; opt.textContent = dep;
    sel.appendChild(opt);
  });
}

document.getElementById('deptFilter').addEventListener('change', function(e){
  currentFilter.dept = e.target.value;
  renderMap(); renderSidebarList();
});
document.getElementById('statusFilter').addEventListener('change', function(e){
  currentFilter.status = e.target.value;
  renderMap(); renderSidebarList();
});
document.getElementById('searchBox').addEventListener('input', function(e){
  currentFilter.search = e.target.value;
  renderMap(); renderSidebarList();
});
document.getElementById('toggleSidebar').addEventListener('click', function(){
  document.getElementById('sidebar').classList.toggle('open');
});

buildMarkers();
renderMap();
renderSidebarList();
updateStats();
populateDeptFilter();
</script>
</body>
</html>
